<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Lite</title>

  <link rel="stylesheet" href="/shared/styles/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-header__brand" href="#/home" data-role="brand">
        <span class="site-header__logo">in</span>
        <span class="site-header__title">Lite</span>
      </a>

      <nav class="site-nav" id="site-nav" aria-label="Primary">
        <!-- Nav items rendered by nav.js based on session state. -->
      </nav>
    </div>
  </header>

  <main id="mfe-root" class="mfe-root">
    <!-- Micro-frontends mount here. -->
    <div class="mfe-loading">Loading…</div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span>LinkedIn Lite &middot; Learning project</span>
      <span class="site-footer__muted">Sessions live in the DB, not JWT</span>
    </div>
  </footer>

  <!-- Shared singletons first, then shell scripts. Order matters. -->
  <script src="/shared/constants.js"></script>
  <script src="/shared/httpClient.js"></script>
  <script src="/shared/ui-components.js"></script>
  <script src="/event-bus/eventBus.js"></script>

  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
