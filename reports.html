<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Splitwise-ish</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>mountNav('reports');</script>

  <main class="page">
    <div class="page-header">
      <div>
        <h1 class="page-title">Reports</h1>
        <p class="page-sub">Overview by category and member, with filter-driven charts.</p>
      </div>
    </div>

    <div class="stat-hero">
      <div>
        <div class="label">Total Group Expense</div>
        <div class="value" id="total-group">₹0</div>
      </div>
      <div class="stat-hero-icon">💸</div>
    </div>

    <div class="panel">
      <h3>Filters</h3>
      <div class="filter-row-6">
        <label>
          Category
          <select id="cat-filter"><option value="">All Categories</option></select>
        </label>
        <label>
          Member (paid or shared)
          <select id="member-filter"><option value="">All Members</option></select>
        </label>
        <label>
          From
          <input type="date" id="date-from">
        </label>
        <label>
          To
          <input type="date" id="date-to">
        </label>
        <button id="reset-filters" class="subtle">Reset</button>
      </div>
    </div>

    <div class="panel">
      <h3>Category Report</h3>
      <div class="grid-cards" id="category-grid"></div>
    </div>

    <div class="panel">
      <h3>Member Report</h3>
      <div class="grid-cards" id="member-grid"></div>
    </div>

    <div class="chart-grid">
      <div class="chart-panel">
        <canvas id="pie-chart"></canvas>
      </div>
      <div class="chart-panel">
        <canvas id="bar-chart"></canvas>
      </div>
    </div>
  </main>

  <script src="js/reports.js"></script>
</body>
</html>
