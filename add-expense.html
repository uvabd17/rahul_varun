<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Expense — Splitwise-ish</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>mountNav('add');</script>

  <main class="page">
    <div class="page-header">
      <div>
        <h1 class="page-title" id="form-title">Add Expense</h1>
        <p class="page-sub">Record a shared expense and pick who was in on it.</p>
      </div>
    </div>

    <div class="panel">
      <form id="expense-form" novalidate>
        <div class="form-grid">
          <label>
            Expense Name
            <input type="text" id="name" placeholder="e.g. Pizza" required>
            <span class="field-error" id="err-name" hidden></span>
          </label>

          <label>
            Amount (₹)
            <input type="number" id="amount" min="1" step="0.01" placeholder="e.g. 900" required>
            <span class="field-error" id="err-amount" hidden></span>
          </label>

          <label>
            Paid By
            <select id="paidBy" required>
              <option value="">Select a member…</option>
            </select>
            <span class="field-error" id="err-paidBy" hidden></span>
          </label>

          <label>
            Category
            <select id="category" required>
              <option value="">Select a category…</option>
            </select>
            <span class="field-error" id="err-category" hidden></span>
          </label>

          <label class="full">
            Date
            <input type="date" id="date" required>
            <span class="field-error" id="err-date" hidden></span>
          </label>

          <div class="full">
            <div style="font-size:0.9rem;color:#4b5563;margin-bottom:0.5rem;font-weight:500">
              Members Shared
            </div>
            <div class="checkbox-group" id="members"></div>
            <span class="field-error" id="err-shared" hidden style="margin-top:0.5rem;display:block"></span>
          </div>

          <div class="full actions">
            <button type="submit" id="submit-btn">Add Expense</button>
            <button type="reset" id="reset-btn" class="subtle">Reset</button>
            <button type="button" id="sample-btn" class="ghost">Load Sample Data</button>
            <button type="button" id="cancel-edit-btn" class="subtle" style="display:none">Cancel Edit</button>
          </div>
        </div>
      </form>
    </div>
  </main>

  <script src="js/expenses.js"></script>
</body>
</html>
