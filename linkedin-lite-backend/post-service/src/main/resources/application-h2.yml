spring:
  datasource:
    url: jdbc:h2:file:/tmp/linkedin-lite-h2/db;AUTO_SERVER=TRUE;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.linkedinlite: DEBUG
