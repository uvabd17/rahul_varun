# In-memory H2 dev profile.
# Purpose: boot the whole stack for smoke tests without needing MySQL installed.
# Data is discarded on restart — do not use for anything you want to keep.
spring:
  datasource:
    url: jdbc:h2:mem:linkedin_lite;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.linkedinlite: DEBUG
