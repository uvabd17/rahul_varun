server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      # Routes are declared explicitly rather than using DiscoveryLocator so
      # the public paths (/auth/**, /users/**) are clean, not /user-service/**.
      routes:
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/auth/**
        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/users/**,/profile/**
      # Global CORS — frontend runs on :3000 during dev.
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
            allowedMethods: [ GET, POST, PUT, PATCH, DELETE, OPTIONS ]
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
