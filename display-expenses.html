<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Expenses — Splitwise-ish</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>mountNav('display');</script>

  <main class="page">
    <div class="page-header">
      <div>
        <h1 class="page-title">All Expenses</h1>
        <p class="page-sub">Search, filter, sort, edit, or delete any recorded expense.</p>
      </div>
      <div class="actions">
        <button id="sample-btn" class="ghost">Load Sample</button>
        <button id="clear-btn" class="danger">Clear All</button>
      </div>
    </div>

    <div class="panel">
      <div class="filter-row">
        <label>
          Search
          <input type="text" id="search-input" placeholder="Search by payer…">
        </label>
        <label>
          Category
          <select id="cat-filter">
            <option value="">All Categories</option>
          </select>
        </label>
        <label>
          Sort By
          <select id="sort-select"></select>
        </label>
      </div>

      <div id="expenses-table"></div>
    </div>
  </main>

  <script src="js/expenses.js"></script>
</body>
</html>
